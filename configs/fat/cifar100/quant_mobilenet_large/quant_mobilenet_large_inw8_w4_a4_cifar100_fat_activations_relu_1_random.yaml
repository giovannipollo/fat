seed:
  enabled: true
  value: 42
  deterministic: false

dataset:
  name: "cifar100"
  root: "./data"
  download: true
  num_workers: 4

model:
  name: "quant_mobilenetv1_large"

quantization:
  in_weight_bit_width: 8
  weight_bit_width: 4
  act_bit_width: 4

training:
  batch_size: 128
  epochs: 100

optimizer:
  name: "adam"
  learning_rate: 0.001
  momentum: 0.9
  weight_decay: 0.0

scheduler:
  name: "cosine"
  T_max: 100
  warmup_epochs: 0

progress:
  enabled: true

checkpoint:
  enabled: true
  dir: "/path/to/experiments"
  save_frequency: 20
  save_best: true
  load_weights: "/path/to/weights.pt"

activation_fault_injection:
  enabled: true
  target_type: activation
  probability: 1
  injection_type: "random"
  apply_during: "both"
  target_layers: ["QuantReLU"]
  track_statistics: true
  verbose: false