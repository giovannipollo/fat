# Quantized CNV (Compact Neural Vision) on CIFAR-10
# 8-bit quantization-aware training (QAT) using Brevitas

seed:
  enabled: true
  value: 42
  deterministic: false

dataset:
  name: "cifar100"
  root: "./data"
  download: true
  num_workers: 4

model:
  name: "cnv"
  
training:
  batch_size: 64
  epochs: 300

optimizer:
  name: "adam"
  learning_rate: 0.001 
  momentum: 0.9
  weight_decay: 0.0001

scheduler:
  name: "cosine"
  T_max: 300
  warmup_epochs: 0

progress:
  enabled: true

checkpoint:
  enabled: true
  dir: "/path/to/experiments"
  save_frequency: 50
  save_best: true
