seed:
  enabled: true
  value: 42
  deterministic: false

dataset:
  name: "cifar100"
  root: "./data"
  download: true
  num_workers: 8

model:
  name: "mobilenetv1"

training:
  batch_size: 64
  epochs: 200

loss:
  name: "sqr_hinge"

optimizer:
  name: "adam"
  learning_rate: 0.001
  momentum: 0.9
  weight_decay: 0.0

scheduler:
  name: "cosine"
  T_max: 200
  warmup_epochs: 5

amp:
  enabled: false

progress:
  enabled: true

checkpoint:
  enabled: true
  dir: "/path/to/experiments"
  save_frequency: 20
  save_best: true
