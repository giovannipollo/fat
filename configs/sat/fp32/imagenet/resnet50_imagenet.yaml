seed:
  enabled: true
  value: 42
  deterministic: false

dataset:
  name: "imagenet"
  root: "/path/to/imagenet"  # Must contain train/ and val/ subdirectories
  download: false 
  num_workers: 8

model:
  name: "resnet50"

training:
  batch_size: 256
  epochs: 90

optimizer:
  name: "sgd"
  learning_rate: 0.1
  momentum: 0.9
  weight_decay: 0.0001

scheduler:
  name: "step"
  step_size: 30
  gamma: 0.1

amp:
  enabled: true

progress:
  enabled: true

checkpoint:
  enabled: true
  dir: "/path/to/experiments"
  save_frequency: 10
  save_best: true
