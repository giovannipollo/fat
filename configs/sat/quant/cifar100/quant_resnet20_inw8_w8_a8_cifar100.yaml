seed:
  enabled: true
  value: 42
  deterministic: false

dataset:
  name: "cifar100"
  root: "./data"
  download: true
  num_workers: 4

model:
  name: "quant_resnet20"

quantization:
  in_weight_bit_width: 8
  weight_bit_width: 8
  act_bit_width: 8

training:
  batch_size: 256
  epochs: 100

optimizer:
  name: sgd
  learning_rate: 0.01
  momentum: 0.9
  weight_decay: 0.0005

scheduler:
  name: "cosine"
  T_max: 100
  warmup_epochs: 0

progress:
  enabled: true

brevitas:
  ignore_missing_keys: true

checkpoint:
  enabled: true
  dir: "/path/to/experiments"
  save_frequency: 50
  save_best: true
  load_weights: "/path/to/checkpoint.pt"
