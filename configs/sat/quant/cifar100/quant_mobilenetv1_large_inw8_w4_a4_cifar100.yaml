seed:
  enabled: true
  value: 42
  deterministic: false

dataset:
  name: "cifar100"
  root: "./data"
  download: true
  num_workers: 8

model:
  name: "quant_mobilenetv1_large"

quantization:
  in_weight_bit_width: 8
  weight_bit_width: 4
  act_bit_width: 4

training:
  batch_size: 64
  epochs: 200

loss:
  name: "sqr_hinge"

optimizer:
  name: "adam"
  learning_rate: 0.001
  momentum: 0.9
  weight_decay: 0.0

scheduler:
  name: "cosine"
  T_max: 200
  warmup_epochs: 5

amp:
  enabled: false

progress:
  enabled: true

brevitas:
  ignore_missing_keys: true

checkpoint:
  enabled: true
  dir: "/path/to/experiments"
  save_frequency: 20
  save_best: true
  load_weights: "/path/to/checkpoint.pt"
